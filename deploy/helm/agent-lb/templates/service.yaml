apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "agent-lb.labels" . | nindent 4 }}
  {{- with mustMerge (.Values.service.annotations | default dict) (.Values.commonAnnotations | default dict) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.service.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  selector:
    {{- $selectorMode := .Values.migration.serviceSelectorMode | default "auto" }}
    {{- $existingService := lookup "v1" "Service" .Release.Namespace (include "agent-lb.fullname" .) }}
    {{- $existingSelector := dict }}
    {{- if $existingService }}
    {{- $existingSelector = get ($existingService.spec | default dict) "selector" | default dict }}
    {{- end }}
    {{- $existingTrafficLane := get $existingSelector "agent-lb.soju.dev/traffic" | default "" }}
    {{- if eq $selectorMode "legacy" }}
    {{- include "agent-lb.legacySelectorLabels" . | nindent 4 }}
    {{- else if eq $selectorMode "workload" }}
    {{- include "agent-lb.workloadSelectorLabels" . | nindent 4 }}
    {{- else if not .Release.IsUpgrade }}
    {{- include "agent-lb.workloadSelectorLabels" . | nindent 4 }}
    {{- else if eq $existingTrafficLane "workload" }}
    {{- include "agent-lb.workloadSelectorLabels" . | nindent 4 }}
    {{- else if eq $existingTrafficLane "legacy" }}
    {{- include "agent-lb.legacySelectorLabels" . | nindent 4 }}
    {{- else }}
    {{- include "agent-lb.legacySelectorLabels" . | nindent 4 }}
    {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
